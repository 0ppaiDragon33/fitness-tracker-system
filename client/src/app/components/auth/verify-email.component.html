<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 flex items-center justify-center px-4 py-8 sm:py-12">
  <div class="card-elevated p-6 sm:p-8 w-full max-w-md animate-slideUp text-center">

    <span class="text-5xl sm:text-6xl inline-block mb-4">📧</span>
    <h1 class="text-xl sm:text-2xl font-black text-slate-900 mb-2">Verify your email</h1>
    <p class="text-slate-600 text-xs sm:text-sm mb-6">
      We sent a verification link to your email address. Please check your inbox and click the link to activate your account.
    </p>

    <div *ngIf="successMsg" class="alert alert-success mb-5 text-xs sm:text-sm">
      <span>✅</span>
      <span>{{ successMsg }}</span>
    </div>

    <div *ngIf="errorMsg" class="alert alert-error mb-5 text-xs sm:text-sm">
      <span>⚠️</span>
      <span>{{ errorMsg }}</span>
    </div>

    <button (click)="resend()" [disabled]="loading"
      class="btn btn-primary w-full mb-4 text-xs sm:text-sm">
      <span *ngIf="loading" class="spinner"></span>
      {{ loading ? 'Sending...' : 'Resend verification email' }}
    </button>

    <p class="text-xs sm:text-sm text-slate-500">
      Already verified?
      <a routerLink="/login" class="link">Sign in</a>
    </p>

  </div>
</div>
