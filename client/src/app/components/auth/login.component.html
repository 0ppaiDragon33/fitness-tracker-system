<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-primary-50 flex items-center justify-center px-4 py-8 sm:py-12">
  <div class="card-elevated p-6 sm:p-8 w-full max-w-md animate-slideUp">
    <div class="text-center mb-6 sm:mb-8">
      <span class="text-4xl sm:text-5xl inline-block mb-3 sm:mb-4">💪</span>
      <h1 class="text-xl sm:text-2xl font-black text-slate-900">Welcome back</h1>
      <p class="text-slate-600 text-xs sm:text-sm mt-2">Sign in to your FitTrack account</p>
    </div>

    <div *ngIf="errorMsg" class="alert alert-error mb-5 text-xs sm:text-sm">
      <span>⚠️</span>
      <span>{{ errorMsg }}</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 sm:space-y-5">
      <div class="form-group">
        <label class="form-label text-xs sm:text-sm">Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" class="input-field text-xs sm:text-sm py-2 sm:py-3">
        <p *ngIf="f['email'].touched && f['email'].invalid" class="form-error text-xs">
          <span>✕</span> Valid email required
        </p>
      </div>

      <div class="form-group">
        <label class="form-label text-xs sm:text-sm">Password</label>
        <input type="password" formControlName="password" placeholder="••••••••" class="input-field text-xs sm:text-sm py-2 sm:py-3">
        <p *ngIf="f['password'].touched && f['password'].invalid" class="form-error text-xs">
          <span>✕</span> Password required
        </p>
      </div>

      <div class="flex items-center justify-between">
        <div></div>
        <a routerLink="/forgot-password" class="text-xs sm:text-sm text-primary-600 hover:underline font-medium">
          Forgot password?
        </a>
      </div>

      <button type="submit" [disabled]="loading" class="btn btn-primary btn-lg w-full text-xs sm:text-base">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="divider my-5 sm:my-6"></div>

    <p class="text-center text-xs sm:text-sm text-slate-600">
      No account? <a routerLink="/register" class="link">Sign up free</a>
    </p>
  </div>
</div>
